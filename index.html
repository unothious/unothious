        .inkcontainer{

        .trail {
            position: absolute;

            height: 30px;

            border-radius: 50%;
            pointer-events: none;

            z-index: 0;

        @keyframes fade { 
            0% {
                opacity: 1;
                transform: scale(2);
            }
            100% {
                opacity: 0;
                transform: scale(0.2);
            }
        }

  <script>
    const container = document.querySelector('.inkcontainer');
    const cursorBlob = document.querySelector('.cursorr');

    // We need to keep track of where the mouse was on the previous frame
    let lastX = 0;
    let lastY = 0;
    let isFirstMove = true;

    // A helper function to handle creating and deleting the dots
    function createTrailDot(x, y) {
        const trail = document.createElement('div');
        trail.classList.add('trail');
        container.appendChild(trail); 
    
        trail.style.left = x + 'px';
        trail.style.top = y + 'px';

        setTimeout(() => {
            trail.remove();
        }, 500); 
    }

    document.addEventListener('mousemove', (e) => {
        const currentX = e.pageX;
        const currentY = e.pageY;

        // 1. Move the permanent main cursor
        cursorBlob.style.left = currentX + 'px';
        cursorBlob.style.top = currentY + 'px';

        // If this is the very first time the mouse moved, set the last coordinates
        // to the current ones to avoid a massive line jumping from the top left corner (0,0)
       if (isFirstMove) {
            lastX = currentX;
            lastY = currentY;
            isFirstMove = false;
        }

    // 2. Calculate the distance between the last position and current position
        const deltaX = currentX - lastX;
        const deltaY = currentY - lastY;
    
    // Pythagorean theorem to find the actual pixel distance
        const distance = Math.sqrt((deltaX * deltaX) + (deltaY * deltaY));

    // 3. Interpolation: Decide how many dots we need to fill the gap
    // Dropping a dot every 5 pixels ensures a completely solid line
        const spacing = 5; 
        const steps = Math.max(1, Math.floor(distance / spacing));

    // 4. Loop through and draw the missing dots
        for (let i = 0; i < steps; i++) {
           // Calculate the exact X and Y coordinates for this step along the line
            const interpolatedX = lastX + (deltaX * (i / steps));
            const interpolatedY = lastY + (deltaY * (i / steps));
        
            createTrailDot(interpolatedX, interpolatedY);
        }

    // 5. Update the last known position for the next time the mouse moves
        lastX = currentX;
        lastY = currentY;
    });

  </script>
